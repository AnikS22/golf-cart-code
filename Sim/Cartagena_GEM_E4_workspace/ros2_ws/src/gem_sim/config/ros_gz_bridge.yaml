# ros_gz_bridge config — Gazebo Harmonic ↔ ROS 2 Humble
#
# Topic names match Sim/urdf/cart_parameters.xacro TOPIC_* properties so
# the sim publishes on the SAME topics the real cart will publish on.
# Autonomy code is identical between sim and real.
#
# Usage:
#   ros2 run ros_gz_bridge parameter_bridge --ros-args -p config_file:=$(ros2 pkg prefix gem_sim)/share/gem_sim/config/ros_gz_bridge.yaml

# ─── Vehicle command (autonomy → sim) ───
# sim_dbw_bridge_node publishes /cmd_vel (after state-machine gating); we
# bridge into Gazebo's /model/gem_e4/cmd_vel (consumed by AckermannSteering).
- ros_topic_name: "cmd_vel"
  gz_topic_name: "/model/gem_e4/cmd_vel"
  ros_type_name: "geometry_msgs/msg/Twist"
  gz_type_name: "gz.msgs.Twist"
  direction: ROS_TO_GZ

# ─── Vehicle telemetry (sim → autonomy) ───
- ros_topic_name: "joint_states"
  gz_topic_name: "joint_states"
  ros_type_name: "sensor_msgs/msg/JointState"
  gz_type_name: "gz.msgs.Model"
  direction: GZ_TO_ROS

- ros_topic_name: "odom"
  gz_topic_name: "odom"
  ros_type_name: "nav_msgs/msg/Odometry"
  gz_type_name: "gz.msgs.Odometry"
  direction: GZ_TO_ROS

# Static pose (TF) from Gazebo
- ros_topic_name: "tf"
  gz_topic_name: "/model/gem_e4/pose"
  ros_type_name: "tf2_msgs/msg/TFMessage"
  gz_type_name: "gz.msgs.Pose_V"
  direction: GZ_TO_ROS

# ─── Sensors (sim → autonomy) ───
