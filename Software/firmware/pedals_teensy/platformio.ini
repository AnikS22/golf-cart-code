# Pedals Teensy 4.1 — Pedals Aux Box
# Throttle DAC bypass + brake actuator + master state machine + J1939 sniffer
[env:pedals_teensy]
platform = teensy
board = teensy41
framework = arduino
upload_protocol = teensy-cli
monitor_speed = 115200

lib_deps =
    https://github.com/tonton81/FlexCAN_T4.git
    adafruit/Adafruit MCP4725

build_flags =
    -I../common/include
    -std=gnu++17
    -DUSB_SERIAL
    -DPEDALS_FW_VERSION=\"0.1.0\"
