; brake_test_teensy — standalone Kar-Tech CAN-actuator bench tool (Teensy 4.1).
;
; Flash:   cd ~/Desktop/brake_test_teensy && pio run -t upload   (press the
;          physical reset button on the Teensy when it says "waiting for board")
; Monitor: pio device monitor -b 115200   (or drive it with brake.py)
;
; Talks to the Kar-Tech 1A001HAJ brake actuator on the SAME CAN2 transceiver
; (pins 0=RX, 1=TX) the steering test used — but J1939 29-bit IDs @ 250k.
; This does NOT overwrite the steering firmware; that lives in
; ~/Desktop/steer_test_teensy. Reflash either project onto the one Teensy.
[env:brake_test_teensy]
platform = teensy
board = teensy41
framework = arduino
upload_protocol = teensy-cli
monitor_speed = 115200

lib_deps =
    https://github.com/tonton81/FlexCAN_T4.git

build_flags =
    -std=gnu++17
    -DUSB_SERIAL
