; brake_sniff_teensy — LISTEN-ONLY CAN sniffer for the Kar-Tech bus (Teensy 4.1).
;
; Flash:   cd ~/Desktop/brake_sniff_teensy && pio run -t upload  (press reset btn)
; Monitor: pio device monitor -b 115200
;
; Sends ONLY harmless Report-Poll requests (0xF1) — asks the actuator for its
; position/status, never touches clutch or motor. Receives every frame on CAN2
; (pin 0=RX,1=TX) @ 250k and prints a live table of every CAN ID seen with its
; latest payload — so we find the actuator's ACTUAL report ID (the 2020 team may
; have reassigned it from the default 0x18FF0001). Safe: no motion, no beeping.
[env:brake_sniff_teensy]
platform = teensy
board = teensy41
framework = arduino
upload_protocol = teensy-cli
monitor_speed = 115200

lib_deps =
    https://github.com/tonton81/FlexCAN_T4.git

build_flags =
    -std=gnu++17
    -DUSB_SERIAL
