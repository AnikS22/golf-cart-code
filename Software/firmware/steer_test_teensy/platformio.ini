; steer_test_teensy — standalone open-loop EPAS18 steering bench tool (Teensy 4.1).
;
; Flash:   cd Software/firmware/steer_test_teensy && pio run -t upload
; Monitor: pio device monitor -b 115200      (or: screen /dev/ttyACM* 115200)
;
; This does NOT run the DBW state machine. It only talks to the EPAS bus so you
; can command steering torque by hand and watch the wheel respond. Flash it to
; the Motion (steering) Teensy — that's the board whose CAN2 (pins 0/1) is wired
; to the EPAS bus. The live Motion firmware matches the repo, so you can restore
; it later with:  cd ../motion_teensy && pio run -t upload
[env:steer_test_teensy]
platform = teensy
board = teensy41
framework = arduino
upload_protocol = teensy-cli
monitor_speed = 115200

lib_deps =
    https://github.com/tonton81/FlexCAN_T4.git

build_flags =
    -std=gnu++17
    -DUSB_SERIAL
