# Motion Teensy 4.1 — Steering Aux Box
# EPAS18 CAN bridge (DCE Motorsport autonomous protocol) + outer steering PI
[env:motion_teensy]
platform = teensy
board = teensy41
framework = arduino
upload_protocol = teensy-cli
monitor_speed = 115200

# FlexCAN_T4 = mature CAN library with hardware-FIFO + IRQ
# Watchdog_t4 = wrapper around the iMXRT1062 WDT
lib_deps =
    https://github.com/tonton81/FlexCAN_T4.git

build_flags =
    -I../common/include
    -std=gnu++17
    -DUSB_SERIAL
    # Define the firmware version visible at boot
    -DMOTION_FW_VERSION=\"0.1.0\"
